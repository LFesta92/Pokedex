<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyDex{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="site-background"></div>
    <div class="site-overlay"></div>
    <div class="site-shell">
        <div class="top-actions">
            <a class="home-button" href="/">Home</a>
            <div class="account-actions">
                {% if session.get("username") %}
                <div class="account-panel">
                    <div class="account-panel-row">
                        <span class="account-greeting">Ciao! {{ session.get("username") }}</span>
                        <a class="account-button" href="/logout">Logout</a>
                    </div>
                    <div class="account-panel-row">
                        <a class="account-button" href="/box">Box</a>
                        <a class="account-button" href="/medaglie">Medaglie</a>
                    </div>
                </div>
                {% else %}
                <a class="account-button" href="/login">Login</a>
                <a class="account-button" href="/register">Registrati</a>
                {% endif %}
            </div>
        </div>
        {% block content %}{% endblock %}
    </div>
    <script>
        (() => {
            const topActions = document.querySelector(".top-actions");
            if (!topActions) return;

            let lastScrollY = window.scrollY;

            const syncTopActions = () => {
                const currentScrollY = window.scrollY;
                const scrollingDown = currentScrollY > lastScrollY;

                if (currentScrollY <= 24) {
                    topActions.classList.remove("is-hidden");
                } else if (scrollingDown && currentScrollY > 120) {
                    topActions.classList.add("is-hidden");
                } else if (!scrollingDown) {
                    topActions.classList.remove("is-hidden");
                }

                lastScrollY = currentScrollY;
            };

            window.addEventListener("scroll", syncTopActions, { passive: true });
            syncTopActions();
        })();
    </script>
</body>
</html>
